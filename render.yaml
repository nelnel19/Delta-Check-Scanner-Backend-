services:
  - type: web
    name: delta-check-scanner-api
    runtime: python3
    repo: https://github.com/nelnel19/Delta-Check-Scanner-Backend-
    branch: main
    plan: free
    buildCommand: |
      python3.11 -m pip install --upgrade pip
      python3.11 -m pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: OCR_SPACE_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true